name: Build and Release

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Install MinGW cross-compiler
      run: |
        sudo apt-get update
        sudo apt-get install -y mingw-w64 zip
    
    - name: Build Windows executable
      run: |
        x86_64-w64-mingw32-g++ \
          -O2 \
          -std=c++20 \
          -mwindows \
          -o MouseJoystick.exe \
          MouseJoystick.cpp \
          -luser32 \
          -lgdi32 \
          -lgdiplus \
          -lpsapi \
          -ldwmapi \
          -static-libgcc \
          -static-libstdc++ \
          || { echo "Build failed"; exit 1; }
    
    - name: Verify build
      run: |
        ls -lh MouseJoystick.exe
        file MouseJoystick.exe
               
    - name: Create Release on Main Push
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: build-${{ github.sha }}
          name: build-${{ github.sha }}
          files: MouseJoystick.exe
          body: built automatically from latest commit.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
